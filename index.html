<style>
  :root{
    --canvas:#F5F1EB;
    --card:#FBF8F2;
    --line:#E8E0D2;
    --ink:#2E2A25;
    --ink-soft:#8A8071;
    --ink-faint:#B4AA98;
    --gold:#A98C52;
    --gold-soft:#C7AC72;
    --icon-bg:#F2EAD8;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;}

  body{
    min-height:100vh;
    min-height:100dvh;
    background:var(--canvas);
    color:var(--ink);
    font-family:"Helvetica Neue",Arial,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    display:flex;
    justify-content:center;
  }

  /* ethereal light — full height */
  .bg{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background:
      radial-gradient(120% 50% at 50% -4%, #FFFFFF 0%, rgba(255,255,255,0) 55%),
      radial-gradient(95% 40% at 50% 18%, rgba(220,188,128,.34) 0%, rgba(220,188,128,0) 60%),
      radial-gradient(85% 50% at 50% 110%, rgba(220,188,128,.14) 0%, rgba(220,188,128,0) 58%),
      radial-gradient(70% 40% at 4% 100%, rgba(196,202,214,.18) 0%, rgba(196,202,214,0) 60%),
      radial-gradient(70% 40% at 96% 100%, rgba(196,202,214,.16) 0%, rgba(196,202,214,0) 60%);
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:400px;
    min-height:100dvh;
    padding:clamp(54px,13vh,96px) clamp(20px,6vw,28px) clamp(40px,8vh,56px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
  }

  /* ---------- header ---------- */
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:9px;
    font-size:.64rem;
    letter-spacing:.36em;
    text-indent:.36em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .eyebrow svg{width:11px;height:19px;display:block;}

  .title{
    margin:clamp(14px,4vw,20px) 0 0;
    text-align:center;
    font-family:"Cormorant Garamond","Playfair Display",Georgia,"Times New Roman",serif;
    font-weight:500;
    font-size:clamp(2.2rem,10.5vw,3rem);
    line-height:1.04;
    letter-spacing:.005em;
    color:var(--ink);
    white-space:nowrap;
  }
  .title .accent{
    display:block;
    white-space:nowrap;
    font-style:italic;
    font-weight:500;
    color:var(--gold);
  }

  .lede{
    margin:clamp(14px,4vw,18px) auto 0;
    max-width:19em;
    text-align:center;
    font-size:.92rem;
    line-height:1.6;
    font-weight:300;
    color:var(--ink-soft);
  }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:clamp(22px,6vw,30px) 0 clamp(20px,5vw,26px);
    color:var(--gold-soft);
  }
  .divider::before,.divider::after{
    content:"";
    width:34px;height:1px;
    background:linear-gradient(90deg,transparent,currentColor);
  }
  .divider::after{background:linear-gradient(90deg,currentColor,transparent);}
  .divider span{width:5px;height:5px;transform:rotate(45deg);background:currentColor;}

  /* ---------- links (full-width plates) ---------- */
  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .row{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:15px;
    min-height:64px;
    padding:12px 22px;
    border-radius:18px;
    background:var(--card);
    border:1px solid var(--line);
    text-decoration:none;
    color:var(--ink);
    box-shadow:0 8px 22px -14px rgba(90,78,54,.35);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .row:active{transform:scale(.98);}
  .row:hover,.row:focus-visible{
    border-color:var(--gold-soft);
    box-shadow:0 14px 30px -14px rgba(120,98,52,.45);
    outline:none;
  }
  .row:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}

  .badge{
    flex:0 0 auto;
    width:42px;height:42px;
    border-radius:50%;
    background:var(--icon-bg);
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);
  }
  .badge svg{width:22px;height:22px;fill:currentColor;}

  .name{
    font-size:1.08rem;
    font-weight:600;
    letter-spacing:.01em;
    white-space:nowrap;
  }

  @media (prefers-reduced-motion:reduce){
    .row{transition:none;}
  }
</style>
